name: Deploy to Rumahweb Shared Hosting

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: production-ftp-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          extensions: mbstring, xml, ctype, json, curl, mysql, dom, fileinfo, pdo_mysql, gd, zip, bcmath, intl
          coverage: none

      - name: Install Composer dependencies
        run: composer install --optimize-autoloader --no-dev --no-interaction

      - name: Clear Laravel caches before packaging
        run: |
          CACHE_STORE=array SESSION_DRIVER=array php artisan optimize:clear
          php artisan config:clear

      - name: Prepare deployment files
        run: |
          rm -rf .git
          rm -rf .github
          rm -rf tests
          rm -rf node_modules
          rm -f .env
          rm -f .env.example
          rm -f .gitignore
          rm -f .gitattributes
          rm -f phpunit.xml
          rm -f README.md

      - name: Deploy to Production via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: ${{ secrets.FTP_PORT }}
          protocol: ftps
          server-dir: ${{ secrets.FTP_SERVER_DIR }}
          security: loose
          timeout: 600000
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            .env
            .env.example

      - name: Notify success
        if: success()
        run: echo "✅ Deployment to production successful!"

      - name: Notify failure
        if: failure()
        run: echo "❌ Deployment to production failed!"
