openapi: 3.0.3
info:
  title: Dental Health API
  description: "Dokumentasi REST API Dental Health.\n\nSetiap endpoint di bawah memiliki deskripsi, contoh request, dan contoh response sukses/gagal.\n\n**Header wajib:** Accept: application/json\n**Auth:** Bearer token Sanctum (klik Authorize di Swagger UI, masukkan token tanpa prefix Bearer)\n\n**Akun demo:** admin@clinic.com / sarah@clinic.com — password: password"
  version: 2.2.0
  contact:
    name: Dental Health API
servers:
  -
    url: /api
    description: "Default — same origin (pakai ini di Swagger, hindari CORS)"
  -
tags:
  -
    name: Public API
    description: "Tanpa auth, throttle 60/menit"
  -
    name: Public Auth
    description: "Register & login user"
  -
    name: Public Bookmarks
    description: Butuh token user
  -
    name: Admin Auth
    description: "Login & reset password admin"
  -
    name: Admin Dashboard
    description: Statistik admin
  -
    name: Admin Banners
    description: CRUD banner
  -
    name: Admin News
    description: CRUD berita
  -
    name: Admin Articles
    description: CRUD artikel
  -
    name: Admin Products
    description: CRUD produk
  -
    name: Admin Tips
    description: CRUD tips
  -
    name: Admin FAQs
    description: CRUD FAQ
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: Sanctum
      description: "Token dari login. Header: Authorization: Bearer {token}"
  parameters:
    SlugParam:
      name: slug
      in: path
      required: true
      schema:
        type: string
      example: cara-menyikat-gigi-yang-benar
    IdParam:
      name: id
      in: path
      required: true
      schema:
        type: integer
      example: 1
    CategoryContent:
      name: category
      in: query
      schema:
        type: string
        enum:
          - kesehatan_gigi
          - teknologi
          - klinik
          - edukasi
          - umum
    CategoryProduct:
      name: category
      in: query
      schema:
        type: string
        enum:
          - perawatan_gigi
          - produk_gigi
          - tips_perawatan
    SearchParam:
      name: search
      in: query
      schema:
        type: string
      example: gigi
    LimitParam:
      name: limit
      in: query
      description: Max 20. Response data jadi array.
      schema:
        type: integer
        minimum: 1
        maximum: 20
        example: 5
    PageParam:
      name: page
      in: query
      description: "Aktifkan pagination. Tanpa ini, response data = array."
      schema:
        type: integer
        minimum: 1
        example: 1
    PerPageParam:
      name: per_page
      in: query
      description: "Item per halaman saat pakai page (1-50, default 15)."
      schema:
        type: integer
        minimum: 1
        maximum: 50
        example: 15
    SortParam:
      name: sort
      in: query
      schema:
        type: string
        enum:
          - latest
          - popular
        default: latest
  schemas:
    JSendError:
      type: object
      required:
        - status
        - message
        - data
      properties:
        status:
          type: boolean
        message:
          type: string
        data:
          nullable: true
    ValidationErrorData:
      type: object
      properties:
        errors:
          type: object
          additionalProperties:
            type: array
            items:
              type: string
    Banner:
      type: object
    Tip:
      type: object
    News:
      type: object
    Article:
      type: object
    Product:
      type: object
    Faq:
      type: object
    User:
      type: object
    Pagination:
      type: object
    DashboardData:
      type: object
paths:
  /v1/public/banners:
    get:
      tags:
        - Public API
      summary: List banner aktif
      description: "Menampilkan banner untuk halaman Beranda aplikasi.\n\n**Auth:** Tidak perlu.\n**Filter:** Hanya `is_active = true`.\n**Urutan:** Terbaru dulu.\n**Rate limit:** 60 request/menit per IP."
      operationId: publicBannersIndex
      responses:
        200:
          description: 200 OK — Banner aktif berhasil dimuat
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: boolean
                  message:
                    type: string
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Banner"
              example:
                status: true
                message: Data banner berhasil dimuat.
                data:
                  -
                    id: 1
                    title: Promo Pemeriksaan Gigi Gratis
                    subtitle: Cek kesehatan gigi Anda bulan ini
                    tag: promo
                    link_url: null
                    is_active: true
                    image_url: "https://example.com/storage/8/banner-1.jpg"
                    created_at: "2026-06-07T04:28:06.000000Z"
                    updated_at: "2026-06-07T04:28:06.000000Z"
        429:
          description: 429 Too Many Requests — Lebih dari 60 request per menit ke grup /public
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JSendError"
              example:
                status: false
                message: Terlalu banyak permintaan. Coba lagi nanti.
                data: null
  /v1/public/tips/today:
    get:
      tags:
        - Public API
      summary: Tips aktif hari ini
      description: "Menampilkan satu tips harian yang sedang aktif (`is_active = true`).\n\n**Auth:** Tidak perlu.\n**Catatan:** Jika tidak ada tip aktif, response 404."
      operationId: publicTipsToday
      responses:
        200:
          description: 200 OK — Tip hari ini ditemukan
          content:
            application/json:
              example:
                status: true
                message: Tips hari ini berhasil dimuat.
                data:
                  id: 1
                  content: "Sikat gigi minimal 2 menit, 2 kali sehari."
                  is_active: true
                  image_url: "https://example.com/storage/1/tip-1.jpg"
                  created_at: "2026-06-07T04:28:06.000000Z"
                  updated_at: "2026-06-07T04:28:06.000000Z"
        404:
          description: 404 Not Found — Belum ada record tip dengan is_active=true
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JSendError"
              example:
                status: false
                message: Tips hari ini belum tersedia.
                data: null
        429:
          description: 429 Too Many Requests — Throttle grup public
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JSendError"
              example:
                status: false
                message: Terlalu banyak permintaan. Coba lagi nanti.
                data: null
  /v1/public/news:
    get:
      tags:
        - Public API
      summary: List berita published
      description: "Daftar berita untuk tab Berita.\n\n**Auth:** Tidak perlu.\n**Filter:** `is_published = true`.\n\n**Mode response (FE yang tentukan):**\n- Tanpa `page` → `data` berupa **array** semua item (sama seperti `/public/banners`)\n- Dengan `page` → `data` berupa **objek pagination** Laravel\n\n**Query pagination (opsional):**\n- `page` — nomor halaman (wajib diisi FE jika mau pagination)\n- `per_page` — item per halaman (1-50, default 15)\n\n**Alternatif tanpa pagination:**\n- `limit` — ambil N item sebagai array (max 20), tanpa perlu `page`"
      operationId: publicNewsIndex
      parameters:
        -
          $ref: "#/components/parameters/CategoryContent"
        -
          $ref: "#/components/parameters/SearchParam"
        -
          $ref: "#/components/parameters/LimitParam"
        -
          $ref: "#/components/parameters/PageParam"
        -
          $ref: "#/components/parameters/PerPageParam"
      responses:
        200:
          description: 200 OK — Berita berhasil dimuat
          content:
            application/json:
              examples:
                tanpaPage_array:
                  summary: Tanpa ?page — data array (default)
                  value:
                    status: true
                    message: Data berita berhasil dimuat.
                    data:
                      -
                        id: 1
                        title: Teknologi AI dalam Diagnosa Gigi
                        slug: teknologi-ai-dalam-diagnosa-gigi
                        category: teknologi
                        summary: AI membantu dokter gigi mendeteksi karies lebih awal.
